apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: blindsided
spec:
  clusterIP: None
  selector:
    app: storage
  ports:
    - port: 50051
      name: grpc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage
  namespace: blindsided
spec:
  serviceName: "storage-service"
  replicas: 3
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
      - name: storage-node
        image: blindsided:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "blindsided.storage.server"]
        env:
        - name: CONTROLLER_HOST
          value: "controller-service"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NODE_PORT
          value: "50051"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          value: "$(POD_NAME).storage-service:50051"
        - name: AUCTION_STORE_PATH
          value: "/var/lib/blindsided/auction-state.pb"
        ports:
        - containerPort: 50051
        volumeMounts:
        - name: storage-state
          mountPath: /var/lib/blindsided
  volumeClaimTemplates:
  - metadata:
      name: storage-state
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
