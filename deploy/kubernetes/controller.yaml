apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: blindsided
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      containers:
      - name: controller
        image: blindsided:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "blindsided.controller.server"]
        env:
        - name: CONTROLLER_PORT
          value: "50050"
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 50050
        livenessProbe:
          tcpSocket:
            port: 50050 
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: controller-service
  namespace: blindsided
spec:
  selector:
    app: controller
  ports:
    - protocol: TCP
      port: 50050
      targetPort: 50050
  type: LoadBalancer
