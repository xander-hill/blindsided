apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-node
  namespace: blindsided
spec:
  replicas: 3
  selector:
    matchLabels:
      app: service-node
  template:
    metadata:
      labels:
        app: service-node
    spec:
      containers:
      - name: service-node
        image: blindsided:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "blindsided.auction_service.server"]
        env:
        - name: CONTROLLER_HOST
          value: "controller-service"
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: service-nodes
  namespace: blindsided
spec:
  selector:
    app: service-node
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
