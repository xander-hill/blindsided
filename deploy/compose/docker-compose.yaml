services:
  controller:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python -m blindsided.controller.server
    ports:
      - "50050:50050"
    environment:
      - CONTROLLER_PORT=50050
      - METRICS_ENABLED=true
      - METRICS_PORT=8000

  storage-0:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python -m blindsided.storage.server
    environment:
      - CONTROLLER_HOST=controller
      - NODE_PORT=50051
      - POD_IP=storage-0:50051
      - AUCTION_STORE_PATH=/var/lib/blindsided/auction-state.pb
      - METRICS_ENABLED=true
      - METRICS_PORT=8000
    volumes:
      - storage-0-state:/var/lib/blindsided
    depends_on:
      - controller

  storage-1:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python -m blindsided.storage.server
    environment:
      - CONTROLLER_HOST=controller
      - NODE_PORT=50051
      - POD_IP=storage-1:50051
      - AUCTION_STORE_PATH=/var/lib/blindsided/auction-state.pb
      - METRICS_ENABLED=true
      - METRICS_PORT=8000
    volumes:
      - storage-1-state:/var/lib/blindsided
    depends_on:
      - controller

  storage-2:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python -m blindsided.storage.server
    environment:
      - CONTROLLER_HOST=controller
      - NODE_PORT=50051
      - POD_IP=storage-2:50051
      - AUCTION_STORE_PATH=/var/lib/blindsided/auction-state.pb
      - METRICS_ENABLED=true
      - METRICS_PORT=8000
    volumes:
      - storage-2-state:/var/lib/blindsided
    depends_on:
      - controller

  service-node:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python -m blindsided.auction_service.server
    ports:
      - "50052:50052"
    environment:
      - CONTROLLER_HOST=controller
      - NODE_PORT=50052
      - METRICS_ENABLED=true
      - METRICS_PORT=8000
    depends_on:
      - controller

  envoy:
    image: envoyproxy/envoy:v1.28-latest
    volumes:
      - ../envoy/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "8080:8080" # This is the port your React app will talk to
    depends_on:
      - service-node

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - controller
      - storage-0
      - storage-1
      - storage-2
      - service-node

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  storage-0-state:
  storage-1-state:
  storage-2-state:
  prometheus-data:
  grafana-data:
