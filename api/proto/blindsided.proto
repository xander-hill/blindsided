syntax = "proto3";

import "google/protobuf/timestamp.proto";

package blindsided;

enum AuctionState {
    AUCTION_STATE_UNSPECIFIED = 0;
    AUCTION_STATE_OPEN = 1;
    AUCTION_STATE_REVEALED = 2;
}

enum AuctionMutationType {
    AUCTION_MUTATION_TYPE_UNSPECIFIED = 0;
    AUCTION_MUTATION_TYPE_CREATE = 1;
    AUCTION_MUTATION_TYPE_PLACE_BID = 2;
    AUCTION_MUTATION_TYPE_WITHDRAW_BID = 3;
    AUCTION_MUTATION_TYPE_REVEAL = 4;
}

enum AuctionOutcome {
    AUCTION_OUTCOME_UNSPECIFIED = 0;
    AUCTION_OUTCOME_NO_BIDS = 1;
    AUCTION_OUTCOME_RESERVE_NOT_MET = 2;
    AUCTION_OUTCOME_SUCCESSFUL_SALE = 3;
}

enum MutationFailureReason {
    MUTATION_FAILURE_REASON_UNSPECIFIED = 0;
    MUTATION_FAILURE_REASON_NOT_FOUND = 1;
    MUTATION_FAILURE_REASON_INVALID_STATE = 2;
    MUTATION_FAILURE_REASON_CONCURRENCY_CONFLICT = 3;
    MUTATION_FAILURE_REASON_REPLICATION_FAILED = 4;
}

message Auction {
    string auction_id = 1;
    string seller_id = 2;
    string title = 3;
    string category = 4;
    string description = 5;
    float reserve_price = 6;
    map<string, ActiveBid> bids = 7;
    AuctionState state = 8;
    int32 version = 9;
    google.protobuf.Timestamp ends_at = 10;
    int64 next_bid_sequence = 11;
    optional AuctionResult result = 12;
}

message PublicAuction {
    string auction_id = 1;
    string seller_id = 2;
    string title = 3;
    string category = 4;
    string description = 5;
    AuctionState state = 6;
    google.protobuf.Timestamp ends_at = 7;
    int32 bidder_count = 8;
    optional AuctionResult result = 9;
}

message AuctionResult {
    AuctionOutcome outcome = 1;
    bool reserve_met = 2;
    bool has_winner = 3;
    optional string winning_bidder_id = 4;
    optional double winning_amount = 5;
}

service AuctionService {
    rpc CreateAuction (CreateAuctionRequest) returns (CreateAuctionResponse);
    rpc GetAuction (GetAuctionRequest) returns (GetAuctionResponse);
    rpc SearchAuctions (SearchAuctionsRequest) returns (SearchAuctionsResponse);
    rpc PlaceBid (BidRequest) returns (BidResponse);
    rpc WithdrawBid(WithdrawBidRequest) returns (WithdrawBidResponse);
    rpc RevealAuction (RevealAuctionRequest) returns (RevealAuctionResponse);
    rpc WatchAuction (AuctionRequest) returns (stream AuctionUpdate);
}

service StorageReplicaService {
    rpc ApplyAuctionMutation (AuctionMutationRequest) returns (AuctionMutationResponse);
    rpc GetAuction (GetAuctionRequest) returns (GetStoredAuctionResponse);
    rpc SearchAuctions (SearchAuctionsRequest) returns (GetStoredAuctionsResponse);
    rpc SyncFullState (StateRequest) returns (StateResponse);
    rpc ReplicateAuction (ReplicationRequest) returns (ReplicationResponse);
    rpc Heartbeat (HealthCheckRequest) returns (HealthCheckResponse);
    rpc PromoteToPrimary (PromotionRequest) returns (PromotionResponse);
}

service ClusterController {
    rpc RegisterNode (RegisterRequest) returns (RegisterResponse);
    rpc GetPrimary (GetPrimaryRequest) returns (GetPrimaryResponse);
    rpc GetClusterInfo (ClusterInfoRequest) returns (ClusterInfoResponse);
}

// --- Requests & Responses ---

message CreateAuctionRequest {
    string seller_id = 1;
    string title = 2;
    string category = 3;
    string description = 4;
    float reserve_price = 5;
    google.protobuf.Timestamp ends_at = 6;
}
message CreateAuctionResponse { bool ok = 1; string auction_id = 2; string message = 3; }

message GetAuctionRequest { string auction_id = 1; }
message GetAuctionResponse {
    bool ok = 1;
    PublicAuction auction = 2;
    string message = 3;
}

message GetStoredAuctionResponse {
    bool ok = 1;
    Auction auction = 2;
    string message = 3;
}

message SearchAuctionsRequest { string query = 1; string category = 2; }
message SearchAuctionsResponse {
    bool ok = 1;
    repeated PublicAuction auctions = 2;
    string message = 3;
    int32 count = 4;
}
message GetStoredAuctionsResponse {
    bool ok = 1;
    repeated Auction auctions = 2;
    string message = 3;
    int32 count = 4;
}

message RevealAuctionRequest {
    string auction_id = 1; 
    string seller_id = 2; 
    int32 expected_version = 3; 
}
message RevealAuctionResponse { bool ok = 1; int32 final_version = 2; string message = 3; }

message BidRequest {
    string auction_id = 1;
    string bidder_id = 2;
    float amount = 3;
    int32 expected_version = 4;
}
message BidResponse { bool success = 1; string message = 2; }

message WithdrawBidRequest {
    string auction_id = 1;
    string bidder_id = 2;
    int32 expected_version = 3;
}

message WithdrawBidResponse {
    bool success = 1;
    int32 final_version = 2;
    string message = 3;
}

message AuctionRequest { string auction_id = 1; string user_id = 2; }
message AuctionUpdate {
    AuctionState state = 1;
    string message = 2;
    int32 bidder_count = 3;
    int32 version = 4;
    optional AuctionResult result = 5;
}

message AuctionMutationRequest {
    AuctionMutationType mutation_type = 1;
    Auction auction = 2;
    string bidder_id = 3;
    int32 expected_version = 4;
}
message AuctionMutationResponse { bool success = 1; int32 current_version = 2; string message = 3; optional MutationFailureReason failure_reason = 4; }

message StateRequest { string requester_id = 1; }
message StateResponse { bool ok = 1; repeated Auction auctions = 2; string message = 3; }

message ReplicationRequest { Auction auction = 1; string primary_id = 2; }
message ReplicationResponse { bool success = 1; int32 ack_version = 2; string message = 3; }

message HealthCheckRequest { string request_source = 1; }
message HealthCheckResponse { bool alive = 1; string role = 2; string message = 3; }

message PromotionRequest { string new_role = 1; }
message PromotionResponse { bool success = 1; string message = 2; }

message RegisterRequest { string address = 1; }
message RegisterResponse { bool success = 1; bool is_primary = 2; string message = 3; }

message GetPrimaryRequest { string requester_id = 1; }
message GetPrimaryResponse { bool success = 1; string primary_address = 2; string message = 3; }

message ClusterInfoRequest {}
message ClusterInfoResponse { bool success = 1; repeated string node_addresses = 2; string message = 3; }

message ActiveBid {
    float amount = 1;
    int64 acceptance_order = 2;
}
