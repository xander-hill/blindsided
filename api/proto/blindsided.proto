syntax = "proto3";

package blindsided;

enum AuctionState {
    AUCTION_STATE_UNSPECIFIED = 0;
    AUCTION_STATE_OPEN = 1;
    AUCTION_STATE_REVEALED = 2;
}

message Auction {
    string auction_id = 1;
    string seller_id = 2;
    string title = 3;
    string category = 4;
    string description = 5;
    float reserve_price = 6;
    map<string, float> bids = 7;
    AuctionState state = 8;
    int32 version = 9;
    bool reserve_met = 10;
}

service BlindSided {
    rpc OpenAuction (OpenRequest) returns (OpenResponse);
    rpc GetStatus (StatusRequest) returns (StatusResponse);
    rpc SearchAuctions (SearchRequest) returns (SearchResponse);
    rpc PlaceSecretBid (BidRequest) returns (BidResponse);
    rpc DropTheGavel (GavelRequest) returns (GavelResponse);
    rpc JoinLiveAuction (AuctionRequest) returns (stream AuctionUpdate);
}

service JudgeNode {
    rpc CommitToVault (CommitRequest) returns (CommitResponse);
    rpc QueryVault (QueryRequest) returns (QueryResponse);
    rpc SyncFullState (StateRequest) returns (StateResponse);
    rpc ReplicateSecret (ReplicationRequest) returns (ReplicationResponse);
    rpc Heartbeat (HealthCheckRequest) returns (HealthCheckResponse);
    rpc PromoteToPrimary (PromotionRequest) returns (PromotionResponse);
}

service Controller {
    rpc RegisterNode (RegisterRequest) returns (RegisterResponse);
    rpc GetPrimary (GetPrimaryRequest) returns (GetPrimaryResponse);
    rpc GetClusterInfo (ClusterInfoRequest) returns (ClusterInfoResponse);
}

// --- Requests & Responses ---

message OpenRequest { Auction auction = 1; }
message OpenResponse { bool ok = 1; string auction_id = 2; string message = 3; }

message StatusRequest { string auction_id = 1; }
message StatusResponse { bool ok = 1; Auction auction = 2; string message = 3; }

message SearchRequest { string query = 1; string category = 2; }
message SearchResponse { bool ok = 1; repeated Auction auctions = 2; string message = 3; }

message GavelRequest { 
    string auction_id = 1; 
    string seller_id = 2; 
    int32 expected_version = 3; 
}
message GavelResponse { bool ok = 1; int32 final_version = 2; string message = 3; }

message BidRequest {
    string auction_id = 1;
    string buyer_id = 2;
    float amount = 3;
    int32 expected_version = 4;
}
message BidResponse { bool success = 1; string message = 2; }

message AuctionRequest { string auction_id = 1; string user_id = 2; }
message AuctionUpdate {
    AuctionState state = 1;
    string message = 2;
    float high_range = 3;
    float low_range = 4;
    int32 bidder_count = 5;
    bool reserve_status = 6;
    float final_price = 7;
    string winner_id = 8;
}

message CommitRequest { 
    Auction auction = 1; 
    bool is_reveal_event = 2; 
    bool skip_consistency_check = 3; 
}
message CommitResponse { bool success = 1; int32 current_version = 2; string message = 3; }

message QueryRequest { string filter = 1; }
message QueryResponse { bool ok = 1; repeated Auction auctions = 2; int32 count = 3; string message = 4; }

message StateRequest { string requester_id = 1; }
message StateResponse { bool ok = 1; repeated Auction auctions = 2; string message = 3; }

message ReplicationRequest { Auction auction = 1; string primary_id = 2; }
message ReplicationResponse { bool success = 1; int32 ack_version = 2; string message = 3; }

message HealthCheckRequest { string request_source = 1; }
message HealthCheckResponse { bool alive = 1; string role = 2; string message = 3; }

message PromotionRequest { string new_role = 1; }
message PromotionResponse { bool success = 1; string message = 2; }

message RegisterRequest { string address = 1; }
message RegisterResponse { bool success = 1; bool is_primary = 2; string message = 3; }

message GetPrimaryRequest { string requester_id = 1; }
message GetPrimaryResponse { bool success = 1; string primary_address = 2; string message = 3; }

message ClusterInfoRequest {}
message ClusterInfoResponse { bool success = 1; repeated string node_addresses = 2; string message = 3; }