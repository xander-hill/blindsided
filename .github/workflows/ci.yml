name: Required CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: required-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Check Python syntax
        run: python -m compileall -q backend tools scripts frontend/demo-control
      - name: Check whitespace
        run: git diff --check
      - name: Run backend and deployment tests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests -v
      - name: Install pinned protobuf generators
        run: python -m pip install grpcio==1.80.0 grpcio-tools==1.80.0 protobuf==6.33.6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - name: Regenerate protobuf clients
        env:
          PROTOC_PYTHON: python
        run: bash scripts/development/generate_proto.sh
      - name: Verify generated files are committed
        run: git diff --exit-code -- backend/blindsided/generated frontend/src/proto

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies from lockfile
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Discover Playwright tests
        run: npx playwright test --list
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Compile demo-control adapter
        run: python3 -m py_compile demo-control/server.py
