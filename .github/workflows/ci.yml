name: Required CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: required-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests -v

  # Frontend checks are intentionally disabled while the frontend is redone.
  # frontend-build:
  #   name: Frontend production build
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   defaults:
  #     run:
  #       working-directory: frontend
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "24"
  #         cache: npm
  #         cache-dependency-path: frontend/package-lock.json
  #     - run: npm ci
  #     - run: npm run build

  lint-format:
    name: Backend format checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Check Python syntax
        run: python -m compileall -q backend tools scripts
      - name: Check changed-file formatting
        run: git diff --check

  generated-code:
    name: Protobuf generated code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install pinned protobuf generators
        run: |
          python -m pip install -r requirements.txt
          python -m pip install grpcio==1.80.0 grpcio-tools==1.80.0 protobuf==6.33.6
      - run: npm ci --prefix frontend
      - name: Regenerate protobuf clients
        env:
          PROTOC_PYTHON: python
        run: bash scripts/development/generate_proto.sh
      - name: Verify generated files are committed
        run: git diff --exit-code -- backend/blindsided/generated frontend/src/proto

  kubernetes-manifests:
    name: Kubernetes manifest tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Test Kubernetes manifests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests/deployment -v
